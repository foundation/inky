name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Tests
        run: cargo test --workspace

  wasm:
    name: WASM Build & Node Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build crates/inky-wasm --target nodejs --out-dir ../../bindings/node

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run Node tests
        working-directory: bindings/node
        run: node test.js

  ffi:
    name: FFI Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build FFI shared library
        run: cargo build -p inky-ffi --release

      - name: Python tests
        working-directory: bindings/python
        run: python3 test.py

      - name: Ruby tests
        working-directory: bindings/ruby
        run: ruby test.rb

      - name: PHP tests
        working-directory: bindings/php
        if: success() || failure()
        run: |
          if command -v php &> /dev/null; then
            php test.php
          else
            echo "PHP not available, skipping"
          fi
